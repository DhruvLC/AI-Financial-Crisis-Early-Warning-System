services:
  api:
    build: .
    image: financial-crisis-ews-api:latest
    container_name: ews-api
    ports:
      - "8000:8000"
    environment:
      EWS_LOG_LEVEL: INFO
      EWS_CORS_ORIGINS: "*"
      EWS_MAX_BATCH_SIZE: "1000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=4).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
