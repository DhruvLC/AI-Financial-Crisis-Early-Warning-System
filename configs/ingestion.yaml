# ── Data ingestion configuration ─────────────────────────────────────────
# Secrets are read from environment variables, NOT stored here.
#   export ALPHAVANTAGE_API_KEY=...
#   export FRED_API_KEY=...            (optional; CSV fallback works without it)
#   ~/.kaggle/kaggle.json              (for kaggle sources)
#   SEC requires a descriptive User-Agent (email) — set below.

storage:
  raw_dir: "data/raw"
  interim_dir: "data/interim"
  metadata_layer: "raw"        # where .meta.json sidecars are written

http:
  timeout_seconds: 30
  max_retries: 3
  backoff_seconds: 2           # exponential: backoff * 2**attempt

logging:
  level: "INFO"
  file: "logs/ingestion.log"

validation:
  # Global fraction of null cells allowed before validation fails.
  # Individual sources may override via `max_missing_pct` under their config.
  max_missing_pct: 0.5

# ── Post-ingestion cross-source validation ────────────────────────────────
# Runs AFTER a full ingestion pass over everything in data/interim/ (see
# `python src/run_data_validation.py`). Complements the per-source validator
# above by checking the corpus as a whole: coverage, schema contracts, sanity
# ranges, freshness, file integrity, statistical anomalies and cross-source
# entity consistency. Expected per-source contracts live in
# `ingestion/cross_validation.py::SCHEMA_REGISTRY`; the keys below tune it.
data_validation:
  min_rows: 1                # generic row floor for sources with no registry entry
  freshness_days: null       # default staleness cap (null = don't check unless
                             #   a source sets its own in the registry)
  max_outlier_pct: 0.20      # >20% of a column beyond the 3×IQR fence -> warn
  check_integrity: true      # recompute interim checksum vs the metadata sidecar
  fail_fast: false           # true -> raise on any fatal finding
  report_path: "reports/cross_source_validation.json"
  # Per-source overrides merged over SCHEMA_REGISTRY, e.g.:
  # sources:
  #   yahoo_finance:
  #     freshness_days: 7
  #     min_rows: 100

  # ── Deep per-dataset validation (src/validation, run_validation.py) ──────
  # Used by the Data Validation module that scores each interim dataset on
  # schema/missing/duplicate/outlier/financial/time-series checks.
  reports_dir: "reports/validation"
  column_missing_warn_pct: 0.30    # per-column null fraction -> warning
  column_missing_error_pct: 0.90   # required column this empty -> error
  future_date_grace_days: 2        # allow small clock skew before "future date"
  outliers:
    zscore_threshold: 3.0
    iqr_multiplier: 1.5
    column_flag_pct: 0.10          # >10% of a column flagged -> warn
    isolation_forest: true         # multivariate; auto-skips if sklearn absent
    contamination: "auto"
  quality_weights:                 # must be >= 0; re-normalised at runtime
    schema: 0.20
    completeness: 0.25
    uniqueness: 0.15
    validity: 0.25
    timeliness: 0.15

sources:

  kaggle_bankruptcy:
    enabled: true
    dataset: "fedesoriano/company-bankruptcy-prediction"
    target_col: "Bankrupt?"

  sec_edgar:
    enabled: true
    user_agent: "FinCrisisEWS research contact@example.com"   # REQUIRED by SEC
    # CIKs to pull company-facts for (zero-padded to 10 digits handled in code).
    ciks: ["0000320193", "0000789019", "0000051143"]          # Apple, Microsoft, IBM
    # XBRL concepts to extract from company facts (us-gaap taxonomy).
    concepts: ["Assets", "Liabilities", "Revenues", "NetIncomeLoss",
               "CashAndCashEquivalentsAtCarryingValue"]

  fred:
    enabled: true
    series:
      GDP: "GDP"
      CPI: "CPIAUCSL"
      FedFundsRate: "FEDFUNDS"
      Treasury10Y: "DGS10"
      Unemployment: "UNRATE"
      MoneySupplyM2: "M2SL"
    start: "2000-01-01"
    # Series differ in frequency (daily yields vs quarterly GDP); an outer join
    # on date is legitimately sparse, so allow a high missing ratio here.
    max_missing_pct: 0.95

  yahoo_finance:
    enabled: true
    tickers: ["AAPL", "MSFT", "IBM", "JPM", "XOM"]
    start: "2015-01-01"
    interval: "1d"

  alpha_vantage:
    enabled: false             # needs ALPHAVANTAGE_API_KEY; off by default
    symbols: ["AAPL", "MSFT"]
    function: "TIME_SERIES_DAILY"

  kaggle_news:
    enabled: false
    dataset: "aaron7sun/stocknews"

  kaggle_stock:
    enabled: false
    dataset: "borismarjanovic/price-volume-data-for-all-us-stocks-etfs"

  world_bank:
    enabled: true
    countries: ["US", "GB", "JP", "DE", "IN"]
    indicators:
      GDP: "NY.GDP.MKTP.CD"
      Population: "SP.POP.TOTL"
      TradePctGDP: "NE.TRD.GNFS.ZS"
    start: 2000
    end: 2023

  imf:
    enabled: true
    # DataMapper API: indicator code + ISO-3 areas.
    # NGDPD = GDP at current prices (USD, billions). Browse indicator codes at
    # https://www.imf.org/external/datamapper/api/v1/indicators
    indicator: "NGDPD"
    areas: ["USA", "GBR", "JPN"]
    start: 2000

  oecd:
    enabled: true
    dataflow: "MEI_CLI"              # composite leading / business confidence
    subject: "BSCICP03"             # business confidence indicator
    areas: ["USA", "GBR", "JPN"]
