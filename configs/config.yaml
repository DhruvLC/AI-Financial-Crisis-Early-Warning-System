# ── AI Financial Crisis Early Warning System ── configuration ──────────────

data:
  # Kaggle "slug" for the Company Bankruptcy Prediction dataset.
  # Auto-download uses the Kaggle API (needs ~/.kaggle/kaggle.json — see README).
  kaggle_dataset: "fedesoriano/company-bankruptcy-prediction"
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  # The label column as it appears in that CSV (note the leading space).
  target_col: "Bankrupt?"

# Stage 4/5 — Data Validation & Quality gate (runs before data prep).
validation:
  enabled: true
  max_missing_pct: 0.5       # per-column null fraction -> error above this
  min_rows: 50               # fewer rows than this -> error
  min_minority_pct: 0.01     # rarer class below this -> warning (imbalance)
  fail_fast: true            # raise on any error (false = report only)
  report_path: "reports/data_validation.json"

# Stage 3 — Data Preparation (preprocessing) module (src/pipeline/preprocessing).
# Each learned step is fit on the train split and re-applied to val/test (leak-safe).
preprocessing:
  fail_fast: true            # raise on the first step failure (false = continue)
  cleaning:
    enabled: true
    drop_invalid_target: true
    drop_inf_rows: true
    standardize_categoricals: true
    lowercase_categoricals: false
    standardize_dates: true
  duplicates:
    enabled: true
    drop_rows: true
    drop_entity_timestamps: true
    drop_timestamps: true
    keep: last
  imputation:
    enabled: true
    strategy: median         # mean | median | knn
    knn_neighbors: 5
  outliers:
    enabled: true
    method: winsorize        # winsorize | iqr_clip | zscore_clip | zscore_filter | isolation_forest | none
    winsor_limits: [0.01, 0.99]
    iqr_multiplier: 1.5
    zscore_threshold: 5.0
  encoding:
    enabled: true
    method: onehot           # onehot | ordinal
    max_cardinality: 50
    drop_first: false
  scaling:
    enabled: true
    method: standard         # standard | minmax | robust | none

# Stage 6 — Exploratory Data Analysis (src/pipeline/eda).
# Runs a suite of analyzers over the processed splits and emits publication-
# quality figures plus JSON/Markdown/HTML/CSV reports under reports/eda/.
eda:
  fail_fast: false           # false = a crashing analyzer is logged & skipped
  reports_dir: "reports/eda"
  dataset: "train"           # which processed split to analyze (train|val|test)
  # Analyzer execution order (also the report order). Omit to use the default.
  analyzers:
    - overview
    - target
    - descriptive
    - missing
    - outliers
    - distributions
    - correlation
    - ratios
    - relationships
    - dimensionality
  figures:
    enabled: true
    dir: "reports/eda/figures"
    dpi: 150
    style: "whitegrid"
    palette: "deep"
  # Per-analyzer overrides (all optional; sensible defaults baked in).
  descriptive:
    percentiles: [1, 5, 10, 25, 50, 75, 90, 95, 99]
  distributions:
    skew_threshold: 1.0
    kurtosis_threshold: 3.0
    top_n: 12
    max_grid_features: 36
  outliers:
    iqr_multiplier: 1.5
    zscore_threshold: 3.0
    isolation_forest: true
    contamination: auto
  correlation:
    high_correlation_threshold: 0.8
    vif_threshold: 10.0
    kendall_max_features: 40
  dimensionality:
    projection: true
    scree_components: 30

# Stage 7 — Feature Engineering (src/pipeline/feature_engineering).
# Fit on the processed train split, applied leak-safe to val/test; engineered
# splits are versioned into data/features/ and reported under
# reports/feature_engineering/.
feature_engineering:
  fail_fast: true            # raise on the first step failure (false = continue)
  eda_report_path: "reports/eda/eda_report.json"   # seeds hints (best-effort)
  generation:
    enabled: true
    log_transform: true
    log_skew_threshold: 1.0
    ratios: true
    max_ratio_pairs: 30
    interactions: true
    max_interaction_pairs: 30
    differences: true
    max_difference_pairs: 20
    polynomial: true
    polynomial_degree: 2
    base_top_k: 12           # bounded base set for pairwise generation
    rolling: false           # needs entity_col/date_col (time-series data)
    entity_aggregates: false # needs entity_col
    entity_col: null
    date_col: null
  multicollinearity:
    enabled: true
    correlation_filter: true
    correlation_threshold: 0.95
    vif_filter: true
    vif_threshold: 10.0
    vif_max_iterations: 50
  selection:
    enabled: true
    variance_threshold: 1.0e-8
    correlation: true
    correlation_floor: 0.0   # 0 disables the |corr(x,y)| floor
    mutual_information: true
    anova: true
    chi_square: true
    top_k: 40                # each statistical voter nominates its top-k
    min_votes: 2             # feature survives with >= this many votes
    rfe: true
    rfe_n_features: 30
    rfe_step: 0.1
    model_based: true
    model_n_estimators: 200
    model_threshold: median
    random_state: 42
  reduction:
    enabled: true
    method: pca              # pca | svd | none
    mode: append             # append components | replace original features
    explained_variance: 0.95 # target when n_components is unset
    n_components: null
    random_state: 42
  importance:
    enabled: true
    random_forest: true
    xgboost: true
    shap: true
    n_estimators: 300
    shap_max_samples: 500
    report_top_n: 25
    random_state: 42
  store:
    enabled: true
    dir: "data/features"

# Stage 8 — Machine Learning (src/pipeline/ml).
# Trains every enabled algorithm on the latest feature-store version,
# evaluates on val/test, compares on a ROC-AUC leaderboard, explains, and
# registers each model (best one separately) under models/.
ml:
  fail_fast: false           # false = a failing model is logged & skipped
  random_state: 42
  # Enabled algorithms (keys of pipeline.ml.models.MODEL_REGISTRY).
  # Optional back-ends (lightgbm, catboost) are skipped if not installed.
  algorithms:
    - logistic_regression
    - decision_tree
    - random_forest
    - extra_trees
    - xgboost
    - lightgbm
    - catboost
    - svm
    - knn
    - naive_bayes
    - mlp
  cross_validation:
    enabled: true
    strategy: stratified_kfold   # stratified_kfold | time_series
    n_splits: 5
  tuning:
    enabled: false           # true = Grid/Random search before final fit
    method: random           # grid | random
    scoring: roc_auc
    n_iter: 15               # random-search budget per model
    # search_spaces:         # optional per-model overrides, e.g.:
    #   random_forest: {n_estimators: [200, 400], max_depth: [null, 10]}
  metrics:                   # evaluation suite (pipeline.ml.evaluation)
    - accuracy
    - precision
    - recall
    - f1
    - roc_auc
    - pr_auc
    - balanced_accuracy
    - mcc
    - cohen_kappa
    - log_loss
    - brier_score
  threshold_optimization:
    enabled: true
    method: youden           # youden | max_f1 | custom
    custom_threshold: 0.5
  explainability:
    shap: true               # skipped gracefully if shap is not installed
    shap_max_samples: 500
    permutation_repeats: 5
    report_top_n: 25
  # model_params:            # optional per-model hyperparameter overrides
  #   random_forest: {n_estimators: 600}
  output:
    models_dir: "models"
    reports_dir: "reports/ml"
    figures_dir: "reports/ml/figures"

# Stage 9 — Deep Learning (src/pipeline/deep_learning).
# Trains every enabled PyTorch network on the latest feature-store version,
# evaluates on val/test with the ML metric suite, compares on a ROC-AUC
# leaderboard, explains, and registers each network (best one separately)
# under models/deep_learning/.
deep_learning:
  fail_fast: false           # false = a failing network is logged & skipped
  random_state: 42
  deterministic: true        # seed all RNGs + deterministic torch kernels
  # Enabled networks (keys of pipeline.deep_learning.models.NETWORK_REGISTRY).
  networks:
    - mlp
    - deep_fc
    - residual
    - wide_deep
  data:
    batch_size: 128
    shuffle: true
    num_workers: 0
  # Per-network architecture overrides (see each network's default_params).
  model_params:
    mlp: {hidden_layers: [64, 32], activation: relu, dropout: 0.2,
          batch_norm: true, initialization: kaiming}
    deep_fc: {hidden_layers: [256, 128, 64, 32], activation: gelu,
              dropout: 0.3, batch_norm: true, initialization: kaiming}
    residual: {width: 128, n_blocks: 3, activation: relu, dropout: 0.2,
               batch_norm: true, initialization: kaiming}
    wide_deep: {hidden_layers: [128, 64], activation: relu, dropout: 0.2,
                batch_norm: true, initialization: kaiming}
  loss:
    name: weighted_bce       # bce | bce_with_logits | weighted_bce | focal
    # pos_weight: null       # default: computed from train class imbalance
    gamma: 2.0               # focal only
    alpha: 0.25              # focal only
  optimizer:
    name: adamw              # adam | adamw | sgd | rmsprop
    lr: 0.001
    weight_decay: 0.0001
  scheduler:
    name: plateau            # plateau | cosine | step | exponential | none
    factor: 0.5
    patience: 5
    # t_max: 50              # cosine
    # step_size: 10          # step
    # gamma: 0.5             # step / exponential
  training:
    epochs: 60
    device: auto             # auto | cuda | mps | cpu
    mixed_precision: true    # used on CUDA only
    gradient_clip: 1.0
    log_every: 5
    # resume_from: models/deep_learning/mlp_last.pt
  early_stopping:
    enabled: true
    patience: 10
    min_delta: 0.0001
  checkpoint:
    enabled: true
    dir: "models/deep_learning"
  threshold_optimization:
    enabled: true
    method: youden           # youden | max_f1 | custom
    custom_threshold: 0.5
  evaluation:
    metrics:
      - accuracy
      - precision
      - recall
      - f1
      - roc_auc
      - pr_auc
      - balanced_accuracy
      - mcc
      - cohen_kappa
      - log_loss
      - brier_score
  explainability:
    permutation: true
    permutation_repeats: 3
    shap: true               # skipped gracefully if shap is not installed
    shap_max_samples: 100
  visualization:
    dpi: 150
  output:
    models_dir: "models/deep_learning"
    reports_dir: "reports/deep_learning"
    figures_dir: "reports/deep_learning/figures"

# Stage 10 — Transformer Models (src/pipeline/transformers).
# Trains every enabled attention-based tabular model on the latest
# feature-store version, evaluates with the shared ML metric suite,
# compares on a ROC-AUC leaderboard (and against the ML/DL leaderboards),
# explains via permutation/SHAP/attention, and registers each model
# (best one separately) under models/transformers/.
transformers:
  fail_fast: false           # false = a failing model is logged & skipped
  random_state: 42
  deterministic: true        # seed all RNGs + deterministic torch kernels
  # Enabled models (keys of pipeline.transformers.models.TRANSFORMER_REGISTRY).
  models:
    - ft_transformer
    - tab_transformer
    - tabular_encoder
  data:
    batch_size: 128
    shuffle: true
    num_workers: 0
  # Per-model architecture overrides (see each model's default_params).
  model_params:
    ft_transformer: {embed_dim: 64, n_heads: 8, n_layers: 3,
                     ff_dim: 128, dropout: 0.1}
    tab_transformer: {embed_dim: 32, n_heads: 8, n_layers: 3,
                      ff_dim: 64, dropout: 0.1, mlp_hidden: [128, 64]}
    tabular_encoder: {embed_dim: 64, n_heads: 4, n_layers: 2,
                      ff_dim: 128, dropout: 0.1,
                      positional_embedding: true}
  loss:
    name: weighted_bce       # bce | bce_with_logits | weighted_bce | focal
    # pos_weight: null       # default: computed from train class imbalance
  optimizer:
    name: adamw              # adam | adamw | sgd | rmsprop
    lr: 0.0005
    weight_decay: 0.0001
  scheduler:
    name: cosine             # plateau | cosine | step | exponential | none
    # t_max: 60              # cosine (default: epochs)
    # factor: 0.5            # plateau
    # patience: 5            # plateau
    # step_size: 10          # step
    # gamma: 0.5             # step / exponential
  training:
    epochs: 60
    device: auto             # auto | cuda | mps | cpu
    mixed_precision: true    # used on CUDA only
    gradient_clip: 1.0
    log_every: 5
    # resume_from: models/transformers/ft_transformer_last.pt
  early_stopping:
    enabled: true
    patience: 10
    min_delta: 0.0001
  checkpoint:
    enabled: true
    dir: "models/transformers"
  threshold_optimization:
    enabled: true
    method: youden           # youden | max_f1 | custom
    custom_threshold: 0.5
  evaluation:
    metrics:
      - accuracy
      - precision
      - recall
      - f1
      - roc_auc
      - pr_auc
      - balanced_accuracy
      - mcc
      - cohen_kappa
      - log_loss
      - brier_score
  explainability:
    permutation: true
    permutation_repeats: 3
    shap: true               # skipped gracefully if shap is not installed
    shap_max_samples: 100
    attention: true          # capture + aggregate attention weights
    attention_max_samples: 256
  # Prior-stage leaderboards used for the cross-family comparison.
  comparison:
    ml_leaderboard: "reports/ml/leaderboard.csv"
    dl_leaderboard: "reports/deep_learning/leaderboard.csv"
  visualization:
    dpi: 150
  output:
    models_dir: "models/transformers"
    reports_dir: "reports/transformers"
    figures_dir: "reports/transformers/figures"

# Stage 11 — Self-Supervised Learning (src/pipeline/self_supervised).
# Pretrains every enabled encoder on the latest feature-store version with
# contrastive learning (SimCLR NT-Xent by default) over configurable
# tabular augmentations, exports latent representations for downstream
# modules, evaluates each encoder with a frozen linear probe (+ optional
# KNN), and registers each encoder (best one separately, as
# best_encoder.pt) under models/self_supervised/.
self_supervised:
  fail_fast: false           # false = a failing encoder is logged & skipped
  random_state: 42
  deterministic: true        # seed all RNGs + deterministic torch kernels
  # Enabled encoders (keys of pipeline.self_supervised.encoder.ENCODER_REGISTRY).
  encoders:
    - mlp
    - residual
    - transformer
  data:
    batch_size: 256          # larger batches = more negatives for NT-Xent
    shuffle: true
    num_workers: 0
  # Per-encoder architecture overrides (see each encoder's default_params).
  encoder_params:
    mlp: {hidden_dims: [256, 128], embedding_dim: 64,
          activation: relu, dropout: 0.1, batch_norm: true}
    residual: {width: 256, n_blocks: 3, embedding_dim: 64,
               activation: relu, dropout: 0.1}
    transformer: {embed_dim: 32, n_heads: 4, n_layers: 2, ff_dim: 64,
                  dropout: 0.1, embedding_dim: 64,
                  positional_embedding: true}
  projection_head:
    hidden_dims: [128]
    projection_dim: 64
    activation: relu
    batch_norm: true
  loss:
    name: nt_xent            # nt_xent | barlow_twins | vicreg
    temperature: 0.5         # nt_xent
    # lambda_offdiag: 0.005  # barlow_twins
    # sim_weight: 25.0       # vicreg
    # var_weight: 25.0       # vicreg
    # cov_weight: 1.0        # vicreg
  # Positive pairs = two independent passes of this pipeline per sample.
  augmentations:
    - {name: feature_masking, ratio: 0.15}
    - {name: gaussian_noise, sigma: 0.1}
    # - {name: feature_dropout, p: 0.1}
    # - {name: random_corruption, ratio: 0.1, scale: 1.0}
    # - {name: column_shuffle, ratio: 0.1}
    # - {name: mixup, alpha: 0.2}
  optimizer:
    name: adamw              # adam | adamw | sgd | rmsprop
    lr: 0.001
    weight_decay: 0.0001
  scheduler:
    name: cosine             # plateau | cosine | step | exponential | none
  training:
    epochs: 100
    device: auto             # auto | cuda | mps | cpu
    mixed_precision: true    # used on CUDA only
    gradient_clip: 1.0
    log_every: 5
    # resume_from: models/self_supervised/mlp_last.pt
  early_stopping:
    enabled: true
    patience: 15
    min_delta: 0.0001
  checkpoint:
    enabled: true
    dir: "models/self_supervised"
  threshold_optimization:
    enabled: true
    method: youden           # youden | max_f1 | custom
    custom_threshold: 0.5
  evaluation:
    linear_probe:            # logistic regression on frozen embeddings
      max_iter: 1000
      C: 1.0
      class_weight: balanced
    knn:
      enabled: true
      k: 15
    metrics:
      - accuracy
      - precision
      - recall
      - f1
      - roc_auc
      - pr_auc
      - balanced_accuracy
      - mcc
      - cohen_kappa
      - log_loss
      - brier_score
  visualization:
    dpi: 150
    projections: [pca, tsne, umap]   # umap skipped if not installed
    projection_max_samples: 2000
    similarity_max_samples: 200
  output:
    models_dir: "models/self_supervised"
    reports_dir: "reports/self_supervised"
    figures_dir: "reports/self_supervised/figures"
    representations_dir: "models/self_supervised/representations"

split:
  test_size: 0.15
  val_size: 0.15
  random_state: 42
  # Set true + provide a date_col to switch to a time-based split (diagram stage 3).
  time_based: false
  date_col: null

features:
  scale: true          # standardize numeric features
  drop_low_variance: true
  variance_threshold: 0.0

models:
  random_forest:
    n_estimators: 400
    max_depth: null
    class_weight: "balanced"
  xgboost:
    n_estimators: 600
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.9
    colsample_bytree: 0.9
    # scale_pos_weight is computed at runtime from class imbalance.

explainability:
  shap_max_samples: 500   # cap rows fed to SHAP for speed

output:
  models_dir: "models"
  reports_dir: "reports"
  risk_score_scale: 100   # map predicted probability → 0..100
