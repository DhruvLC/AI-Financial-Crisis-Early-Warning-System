name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint, test & build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-api.txt
          pip install httpx flake8 pytest

      - name: Lint (flake8 — errors only)
        run: flake8 src/api --select=E9,F63,F7,F82 --show-source

      - name: Unit tests (API)
        run: pytest tests/test_api.py -v

      - name: Import / build verification
        run: |
          python -c "import sys; sys.path.insert(0, 'src'); from api.app import create_app; create_app(); print('app builds OK')"

  docker:
    name: Docker build verification
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t financial-crisis-ews-api:ci .
